    <div id="root">
        <header class="card border-0 mh-10 bg-black">
            <div class="row g-0 gap-0 row-gab-0">
                <!-- Fade-effect for the portfolio opening card image. -->
                <div class="Opening-card-fade position-absolute h-100 p-0 z-1"></div>
                <div class="opening-card-background webserver-image col-md-8 p-0 z-0">
                </div>
                <div class="col-md-4">

                <div class="p-2 z-1">
                    <!-- Login form -->
                    <div class="container-sm login d-block p-2">
                        <form class="login">
                            <div class="row g-3">
                                <label for="staticEmail" class="col-form-label">
                                    You must login to view your current speedruns and to add new ones.</label>
                                <div class="">
                                    <input type="text" readonly class="form-control-plaintext" id="staticEmail" value="(login is secure)">

                                <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">

                            </div>

                                <input type="checkbox" class="form-check-input" id="exampleCheck1">
                                <label class="form-check-label" for="exampleCheck1">Remember me</label>
                            </div>
                            <button type="submit" class="btn btn-primary">This does nothing</button>
                        </form>
                    </div>
                    <!-- "Add speedrun" -form -->

                        <div class="input-group mb-3">

                            <input type="text" class="form-control" placeholder="Variables. (e.g. RTA=yes)" aria-label="Variables" aria-describedby="basic-addon2">
                        </div>
                        <div class="input-group mb-3">
                            <input type="text" class="form-control" placeholder="Video Link" aria-label="Video" aria-describedby="basic-addon2">
                        </div>
                        <div class="input-group mb-3">
                            <textarea class="form-control" placeholder="Comments." aria-label="Comments"></textarea>
                        </div>
                        <div class="col-auto">
                            <button type="submit" class="btn btn-primary mb-3">Add Speedrun</button>

    <!-- Bundled Javascript is added to the page. -->
    <script type="module" src="./javascript/bundle.js"></script>
    <script>
        var lgn = document.querySelector("div.login")
        var form = document.querySelector("div.input")
        lgn.addEventListener('submit', (event)=>{
            event.preventDefault();
            clearLogin()
        });
        function clearLogin() {
            if (lgn.classList.contains('d-block')) {
                lgn.classList.remove("d-block"); lgn.classList.add("d-none")
                form.classList.remove("d-none"); form.classList.add("d-block")
            }
            else {
                form.classList.remove("d-block"); form.classList.add("d-none")
                lgn.classList.remove("d-none"); lgn.classList.add("d-block")
            }
        }
    </script>
